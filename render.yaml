services:
  - type: web
    name: fraudshield-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fraudshield-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true        # chave JWT gerada automaticamente em produção
      - key: PORT
        value: 8000
      - key: ADMIN_PASSWORD
        sync: false        # defina no painel do Render
      - key: ANALISTA_PASSWORD
        sync: false
      - key: CLIENTE_PASSWORD
        sync: false
      - key: SEED_DEMO
        value: "0"          # produção: não cria usuários de demonstração

databases:
  - name: fraudshield-db
    plan: free
